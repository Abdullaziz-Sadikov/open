<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Азимбек & Севинч · 13.06.2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  min-height: 100%;
  background: #ebe6de;
  font-family: 'Cinzel', serif;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  min-height: 100dvh;
  padding: 0;
  position: relative;
}

.card {
  position: relative;
  width: 100%;
  max-width: 480px;
  line-height: 0;
}

.card img {
  width: 100%;
  height: auto;
  display: block;
}

.fade {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 35%;
  background: linear-gradient(to top,
    rgba(235,230,222,0.65) 0%,
    rgba(235,230,222,0.2) 60%,
    transparent 100%);
  pointer-events: none;
}

.btn-wrapper {
  position: absolute;
  bottom: 7%;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  white-space: nowrap;
  opacity: 0;
  animation: riseIn 0.9s cubic-bezier(0.22,1,0.36,1) 0.4s forwards;
}
@keyframes riseIn {
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
  from { opacity: 0; transform: translateX(-50%) translateY(12px); }
}

.thread {
  width: 0.5px;
  height: 36px;
  background: linear-gradient(to bottom, transparent, rgba(90,68,35,0.28));
  transform-origin: top;
  transform: scaleY(0);
  animation: drawLine 0.6s ease 0.9s forwards;
}
@keyframes drawLine { to { transform: scaleY(1); } }

.jewel {
  width: 5px; height: 5px;
  background: rgba(120,90,42,0.38);
  transform: rotate(45deg) scale(0);
  margin: 4px 0 7px;
  animation: pop 0.3s cubic-bezier(0.34,1.56,0.64,1) 1.45s forwards;
}
@keyframes pop { to { transform: rotate(45deg) scale(1); } }

.open-btn {
  font-family: 'Cinzel', serif;
  font-size: 8.5px;
  font-weight: 500;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: #2e2212;
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
  outline: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 9px;
  transition: letter-spacing 0.5s, color 0.4s;
  -webkit-tap-highlight-color: transparent;
  text-decoration: none;
}

.btn-text-wrap {
  position: relative;
  padding: 11px 38px;
  border-top: 0.5px solid rgba(110,82,38,0);
  border-bottom: 0.5px solid rgba(110,82,38,0);
  animation: borderIn 0.6s ease 1.5s forwards;
  transition: padding 0.45s, border-color 0.4s;
}
@keyframes borderIn {
  to {
    border-top-color: rgba(110,82,38,0.36);
    border-bottom-color: rgba(110,82,38,0.36);
  }
}
.btn-text-wrap::before, .btn-text-wrap::after {
  content: '';
  position: absolute;
  border-color: rgba(120,90,40,0.4);
  border-style: solid;
  width: 0; height: 0;
  transition: width 0.3s ease, height 0.3s ease;
}
.btn-text-wrap::before { top:-1px; left:0; border-width:1px 0 0 1px; }
.btn-text-wrap::after  { bottom:-1px; right:0; border-width:0 1px 1px 0; }
.open-btn.on .btn-text-wrap::before,
.open-btn.on .btn-text-wrap::after { width:7px; height:7px; }

.btn-label {
  opacity: 0;
  animation: fadeIn 0.5s ease 1.5s forwards;
}
@keyframes fadeIn { to { opacity: 1; } }

.open-btn:active { transform: scale(0.97); }

.btn-date {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 11px;
  letter-spacing: 3px;
  color: rgba(80,60,28,0);
  animation: fadeDate 0.5s ease 1.8s forwards;
}
@keyframes fadeDate { to { color: rgba(80,60,28,0.36); } }

.ornament {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 10px;
  opacity: 0;
  animation: fadeDate 0.5s ease 2s forwards;
}
.orn-l { width: 20px; height: 0.5px; background: rgba(100,76,36,0.18); }
.orn-d { width: 4px; height: 4px; background: rgba(115,88,40,0.26); transform: rotate(45deg); }
.orn-c { width: 2px; height: 2px; border-radius: 50%; background: rgba(110,84,38,0.2); }

/* КНОПКА "ДАЛЕЕ" СВЕРХУ */
.top-nav {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 100;
  font-family: 'Cinzel', serif;
  font-size: 8px;
  font-weight: 500;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #3d2e1c;
  background: rgba(235,230,222,0.7);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 0.5px solid rgba(110,82,38,0.25);
  border-radius: 40px;
  padding: 8px 20px;
  cursor: pointer;
  transition: all 0.3s ease;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}

.top-nav:hover {
  background: rgba(235,230,222,0.9);
  border-color: rgba(110,82,38,0.5);
  letter-spacing: 5px;
  transform: translateY(-1px);
}

.top-nav:active {
  transform: translateY(1px);
}

.top-nav span:first-child {
  font-size: 10px;
}

@media (max-width: 550px) {
  .top-nav {
    top: 14px;
    right: 14px;
    padding: 6px 16px;
    font-size: 7px;
    letter-spacing: 3px;
  }
  .top-nav span:first-child {
    font-size: 9px;
  }
}

.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(160,130,70,0.13);
  transform: scale(0);
  animation: rpl 0.55s linear forwards;
  pointer-events: none;
}
@keyframes rpl { to { transform: scale(5); opacity: 0; } }
</style>
</head>
<body>

<!-- КНОПКА "ДАЛЕЕ" - ПЕРЕХОД НА test2.html -->
<a href="test2.html" class="top-nav" id="nextBtn">
  <span>→</span>
  <span>Далее</span>
</a>

<div class="card">
  <img src="https://i.postimg.cc/SRn0rgzP/f6c4834d-4c4a-4fdf-902b-a90b6567cd63.png" alt="Азимбек & Севинч" />
  <div class="fade"></div>

  <div class="btn-wrapper">
    <div class="thread"></div>
    <div class="jewel"></div>
    <button class="open-btn" id="openBtn">
      <div class="btn-text-wrap">
        <span class="btn-label">Открыть приглашение</span>
      </div>
      <div class="btn-date">13 · 06 · 2026</div>
    </button>
    <div class="ornament">
      <div class="orn-l"></div>
      <div class="orn-c"></div>
      <div class="orn-d"></div>
      <div class="orn-c"></div>
      <div class="orn-l"></div>
    </div>
  </div>
</div>

<script>
const btn = document.getElementById('openBtn');

// Добавляем класс on для анимации уголков
setTimeout(() => {
  if (btn) btn.classList.add('on');
}, 1800);

// Эффект ряби для кнопки "Открыть приглашение"
function ripple(e, element) {
  const rect = element.getBoundingClientRect();
  const r = document.createElement('span');
  r.className = 'ripple';
  const s = Math.max(rect.width, rect.height) * 1.5;
  const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left - s/2;
  const cy = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top - s/2;
  r.style.cssText = `width:${s}px;height:${s}px;left:${cx}px;top:${cy}px`;
  element.style.position = 'relative';
  element.style.overflow = 'hidden';
  element.appendChild(r);
  setTimeout(() => { 
    if (r && r.remove) r.remove(); 
    element.style.overflow = '';
  }, 600);
}

// Кнопка "Открыть приглашение"
if (btn) {
  btn.addEventListener('click', (e) => {
    e.preventDefault();
    ripple(e, btn);
    setTimeout(() => {
      window.location.href = 'test2.html';
    }, 150);
  });
  btn.addEventListener('touchstart', (e) => ripple(e, btn), { passive: true });
}

// Кнопка "Далее" - ПРОСТЕЙШИЙ ПЕРЕХОД
// Она уже имеет href="test2.html", поэтому будет работать как обычная ссылка
// Дополнительно добавляем ripple эффект для красоты
const nextBtn = document.getElementById('nextBtn');
if (nextBtn) {
  nextBtn.addEventListener('click', (e) => {
    ripple(e, nextBtn);
    // Не отменяем переход, просто добавляем эффект
    setTimeout(() => {
      window.location.href = 'test2.html';
    }, 100);
    e.preventDefault();
  });
}

// Предзагрузка изображения
new Image().src = 'https://i.postimg.cc/SRn0rgzP/f6c4834d-4c4a-4fdf-902b-a90b6567cd63.png';
</script>
</body>
</html>

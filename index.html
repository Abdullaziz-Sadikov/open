<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
<title>Портфолио | Электронные пригласительные</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Great+Vibes&family=Tenor+Sans&family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}
:root {
  --bg: #0a0c0b;
  --card: #161a15;
  --gold: #c9a96e;
  --gold2: #e2cd9c;
  --gold3: #8a6a3a;
  --cream: #f5edd8;
  --text: #e8dcc8;
  --muted: #8a7f6a;
}
body {
  background: var(--bg);
  font-family: 'Tenor Sans', 'Cormorant Garamond', Georgia, serif;
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
body.revealed .main-wrapper {
  opacity: 1;
}
.main-wrapper {
  opacity: 0;
  transition: opacity 1s ease;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.35;
  pointer-events: none;
  z-index: 9998;
}
.ambient {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background: radial-gradient(ellipse 60% 40% at 15% 20%, rgba(201,169,110,0.06) 0%, transparent 55%),
              radial-gradient(ellipse 50% 35% at 85% 80%, rgba(61,122,82,0.05) 0%, transparent 50%);
}
header {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 48px 24px 40px;
  border-bottom: 1px solid rgba(201,169,110,0.12);
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
body.revealed header {
  opacity: 1;
  transform: translateY(0);
}
.logo-ornament {
  display: flex;
  align-items: center;
  gap: 16px;
  justify-content: center;
  margin-bottom: 16px;
}
.logo-ornament .line { width: 40px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold3)); }
.logo-ornament .line.r { background: linear-gradient(90deg, var(--gold3), transparent); }
.logo-sym { font-size: 0.6rem; color: var(--gold3); letter-spacing: 0.5em; }
.site-title {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(2.5rem, 8vw, 4rem);
  color: var(--gold);
  text-shadow: 0 0 30px rgba(201,169,110,0.3);
  line-height: 1.1;
  margin-bottom: 8px;
}
.site-sub {
  font-family: 'Cinzel', serif;
  font-size: 0.55rem;
  letter-spacing: 0.5em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 20px;
}
.header-rule {
  display: flex;
  align-items: center;
  gap: 10px;
  justify-content: center;
  color: var(--gold3);
  font-size: 0.5rem;
  letter-spacing: 0.4em;
}
.header-rule::before, .header-rule::after {
  content: '';
  display: block;
  width: 40px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,169,110,0.35));
}
.header-rule::after { background: linear-gradient(90deg, rgba(201,169,110,0.35), transparent); }
.stat-row { display: flex; gap: 30px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }
.stat { text-align: center; }
.stat-num { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 600; color: var(--gold); line-height: 1; }
.stat-label { font-size: 0.5rem; letter-spacing: 0.35em; color: var(--muted); margin-top: 4px; }
.section-header {
  position: relative;
  z-index: 5;
  text-align: center;
  padding: 40px 24px 0;
  opacity: 0;
  transform: translateY(15px);
  transition: opacity 0.6s ease 0.05s, transform 0.6s ease 0.05s;
}
body.revealed .section-header {
  opacity: 1;
  transform: translateY(0);
}
.section-eyebrow { font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 0.5em; color: var(--gold3); margin-bottom: 8px; }
.section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.5rem, 4vw, 2rem); font-weight: 400; color: var(--cream); font-style: italic; }
.portfolio-grid {
  position: relative;
  z-index: 5;
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
  padding: 30px 20px 60px;
  max-width: 500px;
  margin: 0 auto;
}
@media (min-width: 600px) { .portfolio-grid { grid-template-columns: repeat(2, 1fr); max-width: 800px; } }
@media (min-width: 900px) { .portfolio-grid { grid-template-columns: repeat(3, 1fr); max-width: 1100px; } }
.work-card {
  background: var(--card);
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid rgba(201,169,110,0.1);
  cursor: pointer;
  transition: transform 0.25s ease, border-color 0.2s;
  opacity: 0;
  transform: translateY(20px);
}
body.revealed .work-card { animation: cardReveal 0.5s ease forwards; }
@keyframes cardReveal { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.work-card:active { transform: scale(0.97); border-color: rgba(201,169,110,0.3); }
.card-preview {
  position: relative;
  height: 180px;
  background: #0f0f0e;
  display: flex;
  align-items: center;
  justify-content: center;
}
.work-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 4rem;
  font-weight: 300;
  font-style: italic;
  color: rgba(201,169,110,0.12);
}
.work-label-big {
  font-family: 'Cinzel', serif;
  font-size: 0.55rem;
  letter-spacing: 0.5em;
  color: rgba(201,169,110,0.45);
  position: absolute;
  bottom: 12px;
}
.preview-dots {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 40px;
  background: linear-gradient(to top, var(--card), transparent);
}
.card-body { padding: 16px; }
.work-title { font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.3em; color: var(--gold2); margin-bottom: 10px; }
.card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.tag {
  background: rgba(201,169,110,0.07);
  border: 1px solid rgba(201,169,110,0.15);
  border-radius: 30px;
  padding: 3px 8px;
  font-size: 0.45rem;
  letter-spacing: 0.15em;
  color: var(--gold3);
  font-family: 'Cinzel', serif;
}
.card-hint {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 8px;
  font-family: 'Cinzel', serif;
  font-size: 0.5rem;
  letter-spacing: 0.25em;
  color: rgba(201,169,110,0.5);
}
#modal {
  position: fixed;
  inset: 0;
  z-index: 5000;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0);
  visibility: hidden;
  transition: background 0.3s ease, visibility 0.3s;
}
#modal.open {
  background: rgba(0,0,0,0.9);
  visibility: visible;
}
.modal-inner {
  position: relative;
  width: 92%;
  max-width: 400px;
  height: 80vh;
  background: #fff;
  border-radius: 24px;
  overflow: hidden;
  transform: scale(0.9);
  opacity: 0;
  transition: transform 0.3s ease, opacity 0.3s ease;
  display: flex;
  flex-direction: column;
}
#modal.open .modal-inner {
  transform: scale(1);
  opacity: 1;
}
.modal-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 50px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  pointer-events: none;
}
.modal-work-label { font-family: 'Cinzel', serif; font-size: 0.5rem; letter-spacing: 0.35em; color: rgba(255,255,255,0.8); }
.modal-close {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(0,0,0,0.6);
  border: none;
  color: white;
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: auto;
}
.modal-close:active { transform: scale(0.92); }
#modalFrame { flex: 1; width: 100%; border: none; background: #fff; }
.modal-loading {
  position: absolute;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  z-index: 50;
  transition: opacity 0.3s ease;
}
.modal-loading.gone { opacity: 0; pointer-events: none; }
.loader-ring { width: 40px; height: 40px; border: 2px solid rgba(201,169,110,0.15); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text { font-family: 'Cinzel', serif; font-size: 0.5rem; letter-spacing: 0.4em; color: var(--muted); }
footer {
  position: relative;
  z-index: 5;
  text-align: center;
  padding: 24px 20px 32px;
  border-top: 1px solid rgba(201,169,110,0.08);
  opacity: 0;
  transform: translateY(15px);
  transition: opacity 0.6s ease 0.1s, transform 0.6s ease 0.1s;
}
body.revealed footer { opacity: 1; transform: translateY(0); }
.footer-name { font-family: 'Great Vibes', cursive; font-size: 1.6rem; color: var(--gold3); margin-bottom: 6px; }
.footer-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--muted);
  font-size: 0.55rem;
  letter-spacing: 0.3em;
  font-family: 'Cinzel', serif;
  text-decoration: none;
  border-bottom: 1px solid rgba(201,169,110,0.2);
  padding-bottom: 3px;
}
.music-player {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: rgba(22, 26, 21, 0.9);
  backdrop-filter: blur(16px);
  border-radius: 50px;
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  z-index: 4000;
  border: 1px solid rgba(201,169,110,0.3);
  opacity: 0;
  transition: opacity 0.4s ease;
}
.music-player.visible { opacity: 1; }
.music-icon-mini { font-size: 0.85rem; color: var(--gold2); }
.player-btn {
  background: rgba(201,169,110,0.2);
  border: none;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  cursor: pointer;
  color: var(--gold);
  font-size: 0.75rem;
}
.player-btn:active { transform: scale(0.92); }
.start-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(145deg, #0a0c0b, #111510);
  z-index: 10000;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 28px;
  transition: opacity 0.8s ease, visibility 0.8s ease;
  text-align: center;
  padding: 24px;
}
.start-screen .logo { font-family: 'Great Vibes', cursive; font-size: 3rem; color: var(--gold); margin-bottom: 6px; }
.start-screen .sub { font-family: 'Cinzel', serif; font-size: 0.5rem; letter-spacing: 0.3em; color: var(--muted); }
.start-btn {
  background: rgba(201,169,110,0.12);
  border: 1.5px solid rgba(201,169,110,0.5);
  border-radius: 50px;
  padding: 14px 40px;
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  letter-spacing: 0.3em;
  color: var(--gold2);
  cursor: pointer;
  margin-top: 10px;
}
.start-btn:active { transform: scale(0.96); }
.start-screen.hide { opacity: 0; visibility: hidden; pointer-events: none; }
</style>
</head>
<body>

<div class="start-screen" id="startScreen">
  <div><div class="logo">E‑Invite Studio</div><div class="sub">Электронные пригласительные</div></div>
  <button class="start-btn" id="openPortfolioBtn">Открыть портфолио</button>
</div>

<div class="ambient"></div>

<div class="main-wrapper">
<header>
  <div class="logo-ornament"><div class="line"></div><div class="logo-sym">✦ ✦ ✦</div><div class="line r"></div></div>
  <div class="site-title">Мои работы</div>
  <div class="site-sub">Электронные свадебные приглашения</div>
  <div class="header-rule">✦</div>
  <div class="stat-row">
    <div class="stat"><div class="stat-num" id="worksCount">0</div><div class="stat-label">Работ</div></div>
    <div class="stat"><div class="stat-num">∞</div><div class="stat-label">Вдохновения</div></div>
    <div class="stat"><div class="stat-num">2025</div><div class="stat-label">Сезон</div></div>
  </div>
</header>

<div class="section-header">
  <div class="section-eyebrow">Мои работы</div>
  <div class="section-title">Каждое приглашение — отдельная история</div>
</div>

<div class="portfolio-grid" id="grid"></div>

<footer>
  <div class="footer-name">Dma12r</div>
  <a href="https://t.me/Dma12r" target="_blank" class="footer-link">✦ @Dma12r · Telegram</a>
</footer>
</div>

<div id="modal">
  <div class="modal-inner">
    <div class="modal-bar"><span class="modal-work-label" id="modalLabel"></span><button class="modal-close" id="closeModalBtn">✕</button></div>
    <div class="modal-loading" id="modalLoading"><div class="loader-ring"></div><div class="loader-text">Загрузка...</div></div>
    <iframe id="modalFrame" src="" allow="autoplay"></iframe>
  </div>
</div>

<div class="music-player" id="musicPlayer"><span class="music-icon-mini">♪</span><button class="player-btn" id="playPauseBtn">⏸</button></div>

<script>
(function() {
  // ========== МУЗЫКА ==========
  let audio = null;
  let isPlaying = false;
  let audioStarted = false;
  
  const playPauseBtn = document.getElementById('playPauseBtn');
  const musicPlayerDiv = document.getElementById('musicPlayer');
  const startScreen = document.getElementById('startScreen');
  const openBtn = document.getElementById('openPortfolioBtn');
  const bodyEl = document.body;
  
  function startMusic() {
    if (audioStarted) return;
    if (!audio) {
      audio = new Audio("https://files.catbox.moe/nq445k.mp3");
      audio.loop = true;
      audio.volume = 0.35;
    }
    audio.play().then(() => {
      audioStarted = true;
      isPlaying = true;
      if (playPauseBtn) playPauseBtn.innerHTML = '⏸';
      if (musicPlayerDiv) musicPlayerDiv.classList.add('visible');
    }).catch(function(e) { console.log("Автовоспроизведение заблокировано"); });
  }
  
  function toggleMusic() {
    if (!audio) { startMusic(); return; }
    if (isPlaying) {
      audio.pause();
      isPlaying = false;
      if (playPauseBtn) playPauseBtn.innerHTML = '▶';
    } else {
      audio.play().then(() => {
        isPlaying = true;
        if (playPauseBtn) playPauseBtn.innerHTML = '⏸';
      }).catch(function(e) {});
    }
  }
  
  if (playPauseBtn) {
    playPauseBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      toggleMusic();
    });
  }
  
  function openPortfolio() {
    startMusic();
    if (startScreen) startScreen.classList.add('hide');
    bodyEl.classList.add('revealed');
  }
  
  if (openBtn) {
    openBtn.addEventListener('click', openPortfolio);
  }
  
  // ========== ВАШИ РАБОТЫ (ДОБАВЛЯЙТЕ СЮДА) ==========
  // Укажите ВСЕ ваши папки с работами
  const projects = [
    { folder: "work1", title: "OQ STYLE | Белый стиль", tags: ["Белый", "Акварель", "Минимализм"], preview: "Элегантное белое приглашение" },
    { folder: "work2", title: "NAVKAR | Для друзей жениха", tags: ["Navkar", "Классика", "Шик"], preview: "Стиль для друзей жениха" },
    { folder: "work3", title: "БАХОР | Вайб весны", tags: ["Весна", "Цветы", "Лепестки"], preview: "Нежное весеннее настроение" },
    { folder: "work4", title: "OSHGA TAKLIFNOMA | Приглашение на плов", tags: ["Плов", "Семья", "Уют"], preview: "Тёплое приглашение на плов" },
    { folder: "work5", title: "MUSLIM STYLE", tags: ["Исламский стиль", "Дуа", "Барокко"], preview: "Духовная элегантность" },
    { folder: "work6", title: "OSHGA TAKLIF 2 | Приглашение на плов 2", tags: ["Плов", "Гостеприимство", "Орнамент"], preview: "Щедрое приглашение на плов" },
    { folder: "work7", title: "МИНИМАЛИСТИКА | Таклифнома", tags: ["Минимализм", "Чистота", "Типографика"], preview: "Лаконичное приглашение" }
    { folder: "work8", title: "МИНИМАЛИСТИКА | Таклифнома", tags: ["Минимализм", "Чистота", "Типографика"], preview: "Лаконичное приглашение" }
    // ===== ДОБАВЬТЕ НОВЫЕ РАБОТЫ СЮДА =====
    // { folder: "work8", title: "НАЗВАНИЕ", tags: ["тег1", "тег2"], preview: "Описание" },
  ];
  
  const grid = document.getElementById('grid');
  const worksCountSpan = document.getElementById('worksCount');
  
  if (grid && worksCountSpan) {
    worksCountSpan.innerText = projects.length;
    
    projects.forEach(function(proj, idx) {
      var num = idx + 1;
      var card = document.createElement('div');
      card.className = 'work-card';
      card.style.animationDelay = (idx * 0.03) + 's';
      card.innerHTML = `
        <div class="card-preview">
          <div class="work-num">0${num}</div>
          <div class="work-label-big">${proj.preview}</div>
          <div class="preview-dots"></div>
        </div>
        <div class="card-body">
          <div class="work-title">${proj.title}</div>
          <div class="card-tags">${proj.tags.map(function(t) { return '<span class="tag">' + t + '</span>'; }).join('')}</div>
          <div class="card-hint"><span>Нажмите, чтобы открыть</span><span>→</span></div>
        </div>
      `;
      card.addEventListener('click', function() {
        openProject(proj.folder, proj.title);
      });
      grid.appendChild(card);
    });
  }
  
  // ========== МОДАЛЬНОЕ ОКНО ==========
  const modal = document.getElementById('modal');
  const modalFrame = document.getElementById('modalFrame');
  const modalLoading = document.getElementById('modalLoading');
  const modalLabel = document.getElementById('modalLabel');
  const closeModalBtn = document.getElementById('closeModalBtn');
  
  function openProject(folderName, displayTitle) {
    var path = './' + folderName + '/index.html';
    if (modalLabel) modalLabel.innerText = displayTitle;
    if (modalLoading) modalLoading.classList.remove('gone');
    if (modalFrame) modalFrame.src = '';
    if (modal) modal.classList.add('open');
    document.body.style.overflow = 'hidden';
    if (modalFrame) modalFrame.src = path;
  }
  
  function onFrameLoad() {
    setTimeout(function() { if (modalLoading) modalLoading.classList.add('gone'); }, 300);
  }
  
  function closeModal() {
    if (modal) modal.classList.remove('open');
    document.body.style.overflow = '';
    setTimeout(function() {
      if (modalFrame) modalFrame.src = '';
      if (modalLoading) modalLoading.classList.remove('gone');
    }, 400);
  }
  
  if (modalFrame) { modalFrame.addEventListener('load', onFrameLoad); }
  if (closeModalBtn) { closeModalBtn.addEventListener('click', closeModal); }
  if (modal) { modal.addEventListener('click', function(e) { if (e.target === modal) closeModal(); }); }
  
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Азимбек & Севинч · 13.06.2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:opsz,wght@14..32,300;400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0a0a0a;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Фото на весь экран — чистое, без затемнений */
        .hero {
            position: relative;
            width: 100%;
            min-height: 100vh;
            background-image: url('https://i.postimg.cc/SRn0rgzP/f6c4834d-4c4a-4fdf-902b-a90b6567cd63.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 6vh;
        }

        /* Абсолютно никаких затемнений на фото */
        .hero::before,
        .hero::after {
            display: none;
        }

        /* ===== КНОПКА ПЕРЕХОДА НА test1.html (правый верхний угол) ===== */
        .nav-btn {
            position: fixed;
            top: 28px;
            right: 28px;
            z-index: 100;
            background: rgba(20, 15, 28, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 215, 150, 0.4);
            border-radius: 60px;
            padding: 10px 24px;
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 2px;
            color: #fff5e8;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .nav-btn:hover {
            background: rgba(20, 15, 28, 0.8);
            border-color: rgba(255, 215, 150, 0.8);
            letter-spacing: 2.5px;
            transform: translateY(-2px);
        }

        .nav-btn:active {
            transform: translateY(1px);
        }

        /* ===== КРЕАТИВНАЯ ПРЕМИУМ КНОПКА ОТКРЫТЬ ===== */
        .btn-container {
            position: relative;
            z-index: 10;
        }

        .creative-btn {
            position: relative;
            background: rgba(20, 15, 28, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1.5px solid rgba(255, 215, 150, 0.5);
            border-radius: 80px;
            padding: 18px 52px;
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 3px;
            color: #fff5e8;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            text-transform: uppercase;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.25), 0 0 0 0 rgba(255, 215, 150, 0);
            display: flex;
            align-items: center;
            gap: 12px;
            overflow: hidden;
        }

        .creative-btn .btn-icon {
            font-size: 1.2rem;
            transition: transform 0.3s ease;
            display: inline-block;
        }

        .creative-btn .btn-text {
            position: relative;
        }

        .creative-btn:hover {
            background: rgba(20, 15, 28, 0.7);
            border-color: rgba(255, 215, 150, 0.9);
            letter-spacing: 4px;
            padding: 18px 58px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.4), 0 0 20px rgba(255, 215, 150, 0.3);
        }

        .creative-btn:hover .btn-icon {
            transform: translateX(6px) rotate(5deg);
        }

        .creative-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,215,150,0.3), transparent);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
            pointer-events: none;
        }

        .creative-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-glow-line {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,215,150,0.6), transparent);
            margin: 16px auto 0;
            border-radius: 2px;
            transition: width 0.3s ease, opacity 0.3s;
        }

        .btn-container:hover .btn-glow-line {
            width: 100px;
            opacity: 0.8;
        }

        .btn-subtle {
            text-align: center;
            margin-top: 14px;
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 4px;
            color: rgba(255, 245, 235, 0.5);
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .btn-container:hover .btn-subtle {
            color: rgba(255, 245, 235, 0.85);
            letter-spacing: 5px;
        }

        @media (max-width: 550px) {
            .creative-btn {
                padding: 14px 36px;
                font-size: 0.9rem;
                gap: 8px;
            }
            .creative-btn:hover {
                padding: 14px 42px;
                letter-spacing: 3px;
            }
            .hero {
                padding-bottom: 8vh;
            }
            .btn-subtle {
                font-size: 0.6rem;
                letter-spacing: 3px;
            }
            .nav-btn {
                top: 16px;
                right: 16px;
                padding: 7px 18px;
                font-size: 0.65rem;
                letter-spacing: 1.5px;
            }
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,215,150,0.6), rgba(255,215,150,0));
            transform: scale(0);
            animation: rippleAnim 0.7s linear forwards;
            pointer-events: none;
        }

        @keyframes rippleAnim {
            to {
                transform: scale(8);
                opacity: 0;
            }
        }

        /* ===== ПРЕМИУМ ЛАЙТБОКС ===== */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(24px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            cursor: pointer;
        }

        .lightbox.active {
            opacity: 1;
            visibility: visible;
        }

        .lightbox-card {
            position: relative;
            max-width: 88vw;
            max-height: 88vh;
            border-radius: 32px;
            overflow: hidden;
            transform: scale(0.92) translateY(20px);
            transition: transform 0.5s cubic-bezier(0.2, 0.95, 0.3, 1.1);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,215,150,0.2);
        }

        .lightbox.active .lightbox-card {
            transform: scale(1) translateY(0);
        }

        .lightbox-card img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 28px;
        }

        .lightbox-close {
            position: absolute;
            top: 28px;
            right: 32px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 215, 150, 0.4);
            border-radius: 60px;
            padding: 10px 28px;
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #fff5e8;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 10001;
        }

        .lightbox-close:hover {
            background: rgba(0, 0, 0, 0.75);
            border-color: rgba(255, 215, 150, 0.8);
            letter-spacing: 4px;
        }

        .lightbox-caption {
            position: absolute;
            bottom: 24px;
            left: 0;
            right: 0;
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 0.7rem;
            letter-spacing: 4px;
            color: rgba(255, 245, 235, 0.6);
            text-transform: uppercase;
            pointer-events: none;
        }
    </style>
</head>
<body>

<!-- КНОПКА ПЕРЕХОДА НА test1.html в правом верхнем углу -->
<a href="test1.html" class="nav-btn" id="navBtn">
    <span>⟶</span>
    <span>Далее</span>
</a>

<div class="hero">
    <div class="btn-container">
        <button class="creative-btn" id="openBtn">
            <span class="btn-icon">✦</span>
            <span class="btn-text">Открыть</span>
            <span class="btn-icon">✦</span>
        </button>
        <div class="btn-glow-line"></div>
        <div class="btn-subtle">прикоснись к моменту</div>
    </div>
</div>

<script>
    const btn = document.getElementById('openBtn');
    const imgUrl = 'https://i.postimg.cc/SRn0rgzP/f6c4834d-4c4a-4fdf-902b-a90b6567cd63.png';

    // Эффект ряби при клике
    function createRipple(event, element) {
        const rect = element.getBoundingClientRect();
        const ripple = document.createElement('span');
        ripple.className = 'ripple';
        const size = Math.max(rect.width, rect.height);
        ripple.style.width = ripple.style.height = `${size}px`;
        ripple.style.left = `${event.clientX - rect.left - size / 2}px`;
        ripple.style.top = `${event.clientY - rect.top - size / 2}px`;
        element.style.position = 'relative';
        element.style.overflow = 'hidden';
        element.appendChild(ripple);
        setTimeout(() => ripple.remove(), 700);
    }

    // Открытие премиум лайтбокса
    function openLightbox() {
        const lightbox = document.createElement('div');
        lightbox.className = 'lightbox';
        
        const card = document.createElement('div');
        card.className = 'lightbox-card';
        
        const img = document.createElement('img');
        img.src = imgUrl;
        img.alt = 'Азимбек & Севинч · 13.06.2026';
        
        const closeBtn = document.createElement('button');
        closeBtn.className = 'lightbox-close';
        closeBtn.textContent = 'Закрыть';
        
        const caption = document.createElement('div');
        caption.className = 'lightbox-caption';
        caption.textContent = 'Azuuber ✦ Cebuur ✦ 13.06.2026';
        
        card.appendChild(img);
        lightbox.appendChild(card);
        lightbox.appendChild(closeBtn);
        lightbox.appendChild(caption);
        document.body.appendChild(lightbox);
        
        setTimeout(() => lightbox.classList.add('active'), 20);
        
        function closeLightbox() {
            lightbox.classList.remove('active');
            setTimeout(() => lightbox.remove(), 500);
        }
        
        closeBtn.addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) closeLightbox();
        });
        
        const onEsc = (e) => {
            if (e.key === 'Escape') {
                closeLightbox();
                document.removeEventListener('keydown', onEsc);
            }
        };
        document.addEventListener('keydown', onEsc);
    }
    
    btn.addEventListener('click', (e) => {
        createRipple(e, btn);
        setTimeout(openLightbox, 100);
    });
    
    // Предзагрузка изображения
    const preloadImg = new Image();
    preloadImg.src = imgUrl;
    
    // Анимация появления для кнопки "Далее"
    const navBtn = document.getElementById('navBtn');
    if (navBtn) {
        navBtn.style.animation = 'fadeInRight 0.6s ease-out';
    }
    
    // Добавляем анимации
    const styleAnim = document.createElement('style');
    styleAnim.textContent = `
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .creative-btn {
            animation: fadeInUp 0.6s ease-out;
        }
    `;
    document.head.appendChild(styleAnim);
</script>

</body>
</html>

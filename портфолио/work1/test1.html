<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Азимбек & Севинч · 13.06.2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  min-height: 100%;
  background: #ebe6de;
  font-family: 'Cinzel', serif;
}

/* страница центрирует карточку */
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  min-height: 100dvh;
  padding: 0;
}

.card {
  position: relative;
  width: 100%;
  max-width: 480px;   /* телефонная ширина */
  line-height: 0;
}

/* фото полностью без обрезки */
.card img {
  width: 100%;
  height: auto;
  display: block;
}

/* дымка снизу поверх фото */
.fade {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 35%;
  background: linear-gradient(to top,
    rgba(235,230,222,0.65) 0%,
    rgba(235,230,222,0.2) 60%,
    transparent 100%);
  pointer-events: none;
}

/* кнопка — абсолютно по центру нижней части */
.btn-wrapper {
  position: absolute;
  bottom: 7%;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  white-space: nowrap;
  opacity: 0;
  animation: riseIn 0.9s cubic-bezier(0.22,1,0.36,1) 0.4s forwards;
}
@keyframes riseIn {
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
  from { opacity: 0; transform: translateX(-50%) translateY(12px); }
}

.thread {
  width: 0.5px;
  height: 36px;
  background: linear-gradient(to bottom, transparent, rgba(90,68,35,0.28));
  transform-origin: top;
  transform: scaleY(0);
  animation: drawLine 0.6s ease 0.9s forwards;
}
@keyframes drawLine { to { transform: scaleY(1); } }

.jewel {
  width: 5px; height: 5px;
  background: rgba(120,90,42,0.38);
  transform: rotate(45deg) scale(0);
  margin: 4px 0 7px;
  animation: pop 0.3s cubic-bezier(0.34,1.56,0.64,1) 1.45s forwards;
}
@keyframes pop { to { transform: rotate(45deg) scale(1); } }

.open-btn {
  font-family: 'Cinzel', serif;
  font-size: 8.5px;
  font-weight: 500;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: #2e2212;
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
  outline: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 9px;
  transition: letter-spacing 0.5s, color 0.4s;
  -webkit-tap-highlight-color: transparent;
}

.btn-text-wrap {
  position: relative;
  padding: 11px 38px;
  border-top: 0.5px solid rgba(110,82,38,0);
  border-bottom: 0.5px solid rgba(110,82,38,0);
  animation: borderIn 0.6s ease 1.5s forwards;
  transition: padding 0.45s, border-color 0.4s;
}
@keyframes borderIn {
  to {
    border-top-color: rgba(110,82,38,0.36);
    border-bottom-color: rgba(110,82,38,0.36);
  }
}
.btn-text-wrap::before, .btn-text-wrap::after {
  content: '';
  position: absolute;
  border-color: rgba(120,90,40,0.4);
  border-style: solid;
  width: 0; height: 0;
  transition: width 0.3s ease, height 0.3s ease;
}
.btn-text-wrap::before { top:-1px; left:0; border-width:1px 0 0 1px; }
.btn-text-wrap::after  { bottom:-1px; right:0; border-width:0 1px 1px 0; }
.open-btn.on .btn-text-wrap::before,
.open-btn.on .btn-text-wrap::after { width:7px; height:7px; }

.btn-label {
  opacity: 0;
  animation: fadeIn 0.5s ease 1.5s forwards;
}
@keyframes fadeIn { to { opacity: 1; } }

.open-btn:active { transform: scale(0.97); }

.btn-date {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 11px;
  letter-spacing: 3px;
  color: rgba(80,60,28,0);
  animation: fadeDate 0.5s ease 1.8s forwards;
}
@keyframes fadeDate { to { color: rgba(80,60,28,0.36); } }

.ornament {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 10px;
  opacity: 0;
  animation: fadeDate 0.5s ease 2s forwards;
}
.orn-l { width: 20px; height: 0.5px; background: rgba(100,76,36,0.18); }
.orn-d { width: 4px; height: 4px; background: rgba(115,88,40,0.26); transform: rotate(45deg); }
.orn-c { width: 2px; height: 2px; border-radius: 50%; background: rgba(110,84,38,0.2); }

/* ── LIGHTBOX ── */
.lightbox {
  position: fixed; inset: 0;
  background: rgba(8,6,4,0.96);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.45s ease;
  padding: 20px;
}
.lightbox.on { opacity: 1; }
.lb-inner {
  width: min(90vw, 440px);
  border-radius: 3px;
  overflow: hidden;
  transform: scale(0.94) translateY(10px);
  transition: transform 0.45s cubic-bezier(0.22,1,0.36,1);
  border: 0.5px solid rgba(200,180,140,0.12);
}
.lightbox.on .lb-inner { transform: scale(1) translateY(0); }
.lb-inner img { display: block; width: 100%; height: auto; }
.lb-close {
  position: absolute;
  top: max(22px, env(safe-area-inset-top, 22px));
  right: 22px;
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(215,200,170,0.48);
  background: none;
  border: 0.5px solid rgba(200,180,140,0.16);
  padding: 9px 18px;
  cursor: pointer;
  transition: color 0.3s, border-color 0.3s;
  -webkit-tap-highlight-color: transparent;
}
.lb-close:active { color: rgba(215,200,170,0.9); }

.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(160,130,70,0.13);
  transform: scale(0);
  animation: rpl 0.55s linear forwards;
  pointer-events: none;
}
@keyframes rpl { to { transform: scale(5); opacity: 0; } }
</style>
</head>
<body>

<div class="card">
  <img src="https://i.postimg.cc/SRn0rgzP/f6c4834d-4c4a-4fdf-902b-a90b6567cd63.png" alt="Азимбек & Севинч" />
  <div class="fade"></div>

  <div class="btn-wrapper">
    <div class="thread"></div>
    <div class="jewel"></div>
    <button class="open-btn" id="openBtn">
      <div class="btn-text-wrap">
        <span class="btn-label">Открыть приглашение</span>
      </div>
      <div class="btn-date">13 · 06 · 2026</div>
    </button>
    <div class="ornament">
      <div class="orn-l"></div>
      <div class="orn-c"></div>
      <div class="orn-d"></div>
      <div class="orn-c"></div>
      <div class="orn-l"></div>
    </div>
  </div>
</div>

<script>
const btn = document.getElementById('openBtn');
setTimeout(() => btn.classList.add('on'), 1800);

function ripple(e) {
  const rect = btn.getBoundingClientRect();
  const r = document.createElement('span');
  r.className = 'ripple';
  const s = Math.max(rect.width, rect.height) * 1.5;
  const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left - s/2;
  const cy = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top - s/2;
  r.style.cssText = `width:${s}px;height:${s}px;left:${cx}px;top:${cy}px`;
  btn.style.overflow = 'hidden';
  btn.appendChild(r);
  setTimeout(() => { r.remove(); btn.style.overflow=''; }, 600);
}

function openLb() {
  const lb = document.createElement('div');
  lb.className = 'lightbox';
  const inner = document.createElement('div');
  inner.className = 'lb-inner';
  const img = document.createElement('img');
  img.src = 'https://i.postimg.cc/SRn0rgzP/f6c4834d-4c4a-4fdf-902b-a90b6567cd63.png';
  img.alt = 'Азимбек & Севинч';
  inner.appendChild(img);
  const close = document.createElement('button');
  close.className = 'lb-close';
  close.textContent = 'Закрыть';
  lb.appendChild(inner);
  lb.appendChild(close);
  document.body.appendChild(lb);
  requestAnimationFrame(() => requestAnimationFrame(() => lb.classList.add('on')));
  const off = () => { lb.classList.remove('on'); setTimeout(() => lb.remove(), 480); };
  close.addEventListener('click', off);
  lb.addEventListener('click', e => { if (e.target === lb) off(); });
  document.addEventListener('keydown', e => { if (e.key==='Escape') off(); }, { once: true });
}

btn.addEventListener('click', e => { ripple(e); setTimeout(openLb, 130); });
btn.addEventListener('touchstart', e => ripple(e), { passive: true });
new Image().src = 'https://i.postimg.cc/SRn0rgzP/f6c4834d-4c4a-4fdf-902b-a90b6567cd63.png';
</script>
</body>
</html>

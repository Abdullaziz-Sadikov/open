<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Choyxona | A & X</title>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Allura&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: url('https://i.postimg.cc/XqhdfVWD/abstract-uv-ultraviolet-light-composition-23-2149243965.avif') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Jost', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            cursor: default;
        }

        /* Секретное уведомление (всплывает при активации) */
        .secret-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: linear-gradient(135deg, #1e1e2f, #2a2a3a);
            backdrop-filter: blur(20px);
            color: #ffd966;
            padding: 12px 24px;
            border-radius: 60px;
            font-family: 'Jost', monospace;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 215, 0, 0.6);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.2s ease;
            pointer-events: none;
            white-space: nowrap;
        }
        .secret-toast.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        /* Декоративные светящиеся элементы */
        .glow-spot {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 100, 200, 0.3) 0%, rgba(100, 50, 255, 0) 80%);
            pointer-events: none;
            z-index: 0;
            animation: pulseGlow 4s infinite alternate;
        }
        @keyframes pulseGlow {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0.8; transform: scale(1.2); }
        }
        .spot-1 { width: 400px; height: 400px; top: -100px; left: -100px; }
        .spot-2 { width: 500px; height: 500px; bottom: -150px; right: -150px; animation-duration: 5s; }
        .spot-3 { width: 300px; height: 300px; top: 40%; right: 5%; animation-duration: 3.5s; background: radial-gradient(circle, rgba(0, 200, 255, 0.25) 0%, rgba(0,0,0,0) 80%); }

        /* Кнопка НАЗАД */
        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 8px 18px;
            color: #FFD9A5;
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s ease;
            border: 0.5px solid rgba(255,215,0,0.4);
            z-index: 20;
        }
        .back-button:hover {
            background: rgba(255, 215, 0, 0.25);
            transform: translateX(-3px);
        }

        /* Стеклянная карточка */
        .container {
            position: relative;
            z-index: 10;
            max-width: 520px;
            width: 100%;
            background: rgba(15, 15, 25, 0.55);
            backdrop-filter: blur(14px);
            border-radius: 60px;
            padding: 2.2rem 1.5rem 2rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(35px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Фото места */
        .place-photo {
            width: 100%;
            border-radius: 40px;
            margin-bottom: 1.2rem;
            overflow: hidden;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 215, 150, 0.4);
        }
        .place-photo img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.3s ease;
        }
        .place-photo img:hover {
            transform: scale(1.02);
        }

        .initials {
            font-family: 'Allura', 'Great Vibes', cursive;
            font-size: 3.8rem;
            background: linear-gradient(135deg, #f6f867, #f5ea50, #f7f455);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.2rem;
            letter-spacing: 0.02em;
            text-shadow: 0 0 15px rgba(56, 36, 49, 0.5);
        }

        .title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #FFE5B4, #FFB347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        /* Карточка с описанием */
        .message-card {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 1.2rem 0.8rem;
            margin: 1rem 0 1.2rem;
            border: 1px solid rgba(255,255,200,0.2);
        }

        .main-message {
            font-size: 1.2rem;
            font-weight: 500;
            color: #FFE5B4;
            line-height: 1.4;
            letter-spacing: 1px;
        }

        /* БЛОК С КНОПКАМИ КАРТ */
        .map-buttons {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin: 0.8rem 0 1rem;
        }
        .map-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(20, 20, 35, 0.8);
            backdrop-filter: blur(8px);
            padding: 14px 16px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.2rem;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: white;
        }
        .map-btn.yandex {
            background: linear-gradient(105deg, #cc0000, #990000);
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
        }
        .map-btn.google {
            background: linear-gradient(105deg, #1a73e8, #0d47a1);
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
        }
        .map-btn span {
            font-size: 1.4rem;
        }
        .map-btn:active {
            transform: scale(0.97);
        }
        .map-btn:hover {
            filter: brightness(1.08);
            transform: translateY(-2px);
        }

        /* Телефонная кнопка */
        .call-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            background: linear-gradient(105deg, #00c6a7, #008b74);
            color: white;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: 700;
            padding: 0.9rem 1.5rem;
            border-radius: 80px;
            margin: 0.5rem 0 0.2rem;
            transition: 0.25s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            width: 100%;
            border: none;
            cursor: pointer;
        }
        .call-button:active {
            transform: scale(0.96);
        }
        .footer-note {
            font-size: 0.7rem;
            color: #ccb9a6;
            margin-top: 1.5rem;
            border-top: 1px solid rgba(255,240,210,0.2);
            padding-top: 1rem;
        }

        @media (max-width: 560px) {
            .container { padding: 1.5rem 1rem; margin: 0 12px; }
            .initials { font-size: 3rem; }
            .title { font-size: 1.5rem; }
            .main-message { font-size: 1rem; }
            .map-btn { font-size: 1rem; padding: 10px 12px; }
            .map-btn span { font-size: 1.2rem; }
            .call-button { font-size: 1.1rem; padding: 0.7rem 1rem; }
            .back-button { top: 12px; left: 12px; padding: 5px 12px; font-size: 0.75rem; }
            .secret-toast { font-size: 0.7rem; white-space: nowrap; padding: 8px 16px; }
        }
    </style>
</head>
<body>

    <div class="glow-spot spot-1"></div>
    <div class="glow-spot spot-2"></div>
    <div class="glow-spot spot-3"></div>

    <!-- Секретный тост-уведомление -->
    <div id="secretToast" class="secret-toast">🔓 Секретный портал открыт!</div>

    <div class="container">
        <!-- Кнопка НАЗАД -->
        <a href="index.html" class="back-button">← Назад</a>

        <!-- Фото места сверху -->
        <div class="place-photo">
            <img src="https://i.postimg.cc/brQN2S5x/2u1u.jpg" alt="Choyxona manzili">
        </div>

        <div class="initials">Sultan Garden</div>
        <div class="title">CHOYXONA</div>

        <div class="message-card">
            <div class="main-message">
                🌿 Соат 18:00да<br>
                Кутиб қоламиз!
            </div>
        </div>

        <!-- ДВЕ КНОПКИ КАРТ (Яндекс и Google) -->
        <div class="map-buttons">
            <a href="https://yandex.uz/maps/-/CPcceKZn" class="map-btn yandex" target="_blank" rel="noopener noreferrer">
                <span>🗺️</span> Яндекс Карта
            </a>
            <a href="https://maps.app.goo.gl/eftuwCDj3P6rZSPf8" class="map-btn google" target="_blank" rel="noopener noreferrer">
                <span>📍</span> Google Карта
            </a>
        </div>

        <div class="footer-note">
        </div>
    </div>

    <script>
        // ========================
        // СЕКРЕТНАЯ ФИШКА: Ctrl + 3 клика (по любому месту сайта)
        // ========================
        (function() {
            // ✅ ВАША ССЫЛКА (уже вставлена). Сайт откроется в ТОМ ЖЕ ОКНЕ (текущая вкладка)
            const SECRET_URL = "https://2u81z6.noodlemagazine.com/watch/-206760533_456239235";
            
            let clickCount = 0;          // счётчик кликов
            let ctrlPressed = false;     // зажат ли Ctrl
            let timeoutId = null;         // таймаут для сброса
            
            // Получаем элемент тоста
            const toast = document.getElementById('secretToast');
            
            // Функция показа уведомления
            function showSecretMessage(text) {
                if (!toast) return;
                toast.textContent = text || "🔓 Секретный портал открыт!";
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 1800);
            }
            
            // Функция активации секрета — открываем в ТОМ ЖЕ ОКНЕ (текущая вкладка)
            function activateSecret() {
                if (!SECRET_URL) {
                    console.warn('Секретный URL не настроен! Поменяйте SECRET_URL в коде.');
                    showSecretMessage("⚠️ Секретный сайт пока не задан");
                    return;
                }
                showSecretMessage("🚀 Переход на секретный сайт...");
                
                // ⭐ ГЛАВНОЕ ИЗМЕНЕНИЕ: открываем в текущем окне (а не в новой вкладке)
                window.location.href = SECRET_URL;
                
                // Сбрасываем счётчики после активации
                resetSecretState();
            }
            
            function resetSecretState() {
                clickCount = 0;
                if (timeoutId) clearTimeout(timeoutId);
                timeoutId = null;
                // Не сбрасываем ctrlPressed, так как он обрабатывается отдельно в keyup
            }
            
            // Обработчик нажатия клавиш (отслеживаем Ctrl)
            function onKeyDown(e) {
                if (e.key === 'Control' || e.key === 'Meta') {  // Meta для Cmd на Mac
                    ctrlPressed = true;
                }
            }
            
            function onKeyUp(e) {
                if (e.key === 'Control' || e.key === 'Meta') {
                    ctrlPressed = false;
                    // При отпускании Ctrl сбрасываем всю последовательность (безопасность)
                    resetSecretState();
                }
            }
            
            // Глобальный обработчик кликов
            function onDocumentClick(e) {
                // Если Ctrl не зажат — игнорируем и сбрасываем прогресс
                if (!ctrlPressed) {
                    if (clickCount !== 0) resetSecretState();
                    return;
                }
                
                // Если Ctrl зажат — увеличиваем счётчик кликов
                clickCount++;
                
                // Если набрано 3 клика — активируем секретную фишку
                if (clickCount >= 3) {
                    activateSecret();
                    resetSecretState();  // сразу обнуляем, чтобы не активировалось повторно
                } else {
                    // Перезапускаем таймаут сброса (2 секунды между кликами)
                    if (timeoutId) clearTimeout(timeoutId);
                    timeoutId = setTimeout(() => {
                        // Если за 2 секунды не нажали следующий клик — сбрасываем
                        if (clickCount > 0 && clickCount < 3) {
                            resetSecretState();
                        }
                    }, 2000);
                }
            }
            
            // Вешаем слушатели
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            document.addEventListener('click', onDocumentClick);
            
            // Небольшой лог в консоль (для проверки разработчиком, но не мешает)
            console.log('🎩 Секретная фишка активна: удерживайте Ctrl и сделайте 3 клика в любом месте страницы. Сайт откроется в этом же окне.');
        })();
    </script>
</body>
</html>

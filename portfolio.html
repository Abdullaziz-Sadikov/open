<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
<title>Портфолио | Электронные пригласительные</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Great+Vibes&family=Tenor+Sans&family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#0a0c0b;
  --card:#161a15;
  --gold:#c9a96e;
  --gold2:#e2cd9c;
  --gold3:#8a6a3a;
  --cream:#f5edd8;
  --text:#e8dcc8;
  --muted:#8a7f6a;
}

html{background:var(--bg);scroll-behavior:smooth}
body{
  background:var(--bg);
  font-family:'Tenor Sans','Cormorant Garamond',Georgia,serif;
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  padding-bottom: 90px;
}

body::before{
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:0.35;
  pointer-events:none;
  z-index:9998;
}

.ambient{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 15% 20%, rgba(201,169,110,0.06) 0%, transparent 55%),
    radial-gradient(ellipse 50% 35% at 85% 80%, rgba(61,122,82,0.05) 0%, transparent 50%);
}

/* HEADER */
header{
  position:relative;z-index:10;
  text-align:center;
  padding:72px 24px 56px;
  border-bottom:1px solid rgba(201,169,110,0.12);
}
.logo-ornament{
  display:flex;align-items:center;gap:16px;justify-content:center;
  margin-bottom:20px;
}
.logo-ornament .line{width:50px;height:1px;background:linear-gradient(90deg,transparent,var(--gold3))}
.logo-ornament .line.r{background:linear-gradient(90deg,var(--gold3),transparent)}
.logo-sym{font-size:0.65rem;color:var(--gold3);letter-spacing:.5em}
.site-title{
  font-family:'Great Vibes',cursive;
  font-size:clamp(3rem,10vw,5rem);
  color:var(--gold);
  text-shadow:0 0 60px rgba(201,169,110,0.3);
  line-height:1.1;
  margin-bottom:8px;
}
.site-sub{
  font-family:'Cinzel',serif;
  font-size:0.58rem;
  letter-spacing:.55em;
  color:var(--muted);
  text-transform:uppercase;
  margin-bottom:28px;
}
.header-rule{
  display:flex;align-items:center;gap:12px;justify-content:center;
  color:var(--gold3);font-size:.55rem;letter-spacing:.4em;
}
.header-rule::before,.header-rule::after{
  content:'';display:block;width:60px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,169,110,0.35));
}
.header-rule::after{background:linear-gradient(90deg,rgba(201,169,110,0.35),transparent)}
.stat-row{
  display:flex;gap:40px;justify-content:center;margin-top:32px;flex-wrap:wrap;
}
.stat{text-align:center}
.stat-num{
  font-family:'Cormorant Garamond',serif;
  font-size:2rem;font-weight:600;color:var(--gold);line-height:1;
}
.stat-label{font-size:.55rem;letter-spacing:.35em;color:var(--muted);margin-top:4px}

/* SECTION */
.section-header{
  position:relative;z-index:5;
  text-align:center;
  padding:48px 24px 8px;
}
.section-eyebrow{
  font-family:'Cinzel',serif;font-size:.55rem;
  letter-spacing:.5em;color:var(--gold3);margin-bottom:12px;
}
.section-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(1.8rem,5vw,2.6rem);
  font-weight:400;color:var(--cream);font-style:italic;
}

/* GRID */
.portfolio-grid{
  position:relative;z-index:5;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(min(300px,90vw),1fr));
  gap:20px;
  padding:40px 20px 80px;
  max-width:1100px;
  margin:0 auto;
}

/* CARD */
.work-card{
  position:relative;
  background:var(--card);
  border-radius:24px;
  overflow:hidden;
  border:1px solid rgba(201,169,110,0.1);
  cursor:pointer;
  transition:transform .35s cubic-bezier(0.2,0.9,0.4,1), border-color .3s, box-shadow .35s;
  animation:cardReveal .7s ease both;
}
.work-card:nth-child(1){animation-delay:.05s}
.work-card:nth-child(2){animation-delay:.12s}
.work-card:nth-child(3){animation-delay:.19s}
.work-card:nth-child(4){animation-delay:.26s}
.work-card:nth-child(5){animation-delay:.33s}
.work-card:nth-child(6){animation-delay:.40s}
.work-card:nth-child(7){animation-delay:.47s}
@keyframes cardReveal{
  from{opacity:0;transform:translateY(24px) scale(0.97);}
  to{opacity:1;transform:translateY(0) scale(1);}
}
.work-card:hover{
  transform:translateY(-5px) scale(1.01);
  border-color:rgba(201,169,110,0.28);
  box-shadow:0 20px 50px rgba(0,0,0,0.35), 0 0 0 1px rgba(201,169,110,0.12);
}
.work-card:active{transform:scale(0.98)}

/* PREVIEW */
.card-preview{
  position:relative;
  height:200px;
  overflow:hidden;
  background:#0f0f0e;
  display:flex;align-items:center;justify-content:center;
}
.work-num{
  font-family:'Cormorant Garamond',serif;
  font-size:5rem;
  font-weight:300;
  font-style:italic;
  color:rgba(201,169,110,0.12);
  line-height:1;
  user-select:none;
  position:absolute;
  transition:color .3s;
}
.work-card:hover .work-num{color:rgba(201,169,110,0.2)}
.work-label-big{
  font-family:'Cinzel',serif;
  font-size:0.62rem;
  letter-spacing:.55em;
  color:rgba(201,169,110,0.45);
  position:absolute;
  bottom:18px;
  left:0;right:0;
  text-align:center;
}
.preview-dots{
  position:absolute;bottom:0;left:0;right:0;
  height:50px;
  background:linear-gradient(to top,var(--card),transparent);
  z-index:3;
}
.card-preview::before{
  content:'';
  position:absolute;top:0;left:20%;right:20%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,169,110,0.3),transparent);
  z-index:4;
}

/* CARD BODY */
.card-body{padding:20px 20px 18px}
.work-title{
  font-family:'Cinzel',serif;
  font-size:0.75rem;
  letter-spacing:.4em;
  color:var(--gold2);
  margin-bottom:14px;
}
.card-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px}
.tag{
  background:rgba(201,169,110,0.07);
  border:1px solid rgba(201,169,110,0.15);
  border-radius:40px;
  padding:3px 9px;
  font-size:.48rem;
  letter-spacing:.18em;
  color:var(--gold3);
  font-family:'Cinzel',serif;
}
.card-btn{
  width:100%;
  background:transparent;
  border:1px solid rgba(201,169,110,0.25);
  border-radius:60px;
  padding:10px 0;
  font-family:'Cinzel',serif;
  font-size:.58rem;
  letter-spacing:.35em;
  color:var(--gold2);
  cursor:pointer;
  transition:all .25s ease;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.card-btn:hover{
  background:rgba(201,169,110,0.07);
  border-color:rgba(201,169,110,0.5);
}

/* MODAL */
#modal{
  position:fixed;inset:0;
  z-index:5000;
  display:flex;align-items:flex-end;justify-content:center;
  background:rgba(0,0,0,0);
  visibility:hidden;
  transition:background .4s ease, visibility .4s;
}
#modal.open{
  background:rgba(0,0,0,0.85);
  visibility:visible;
  backdrop-filter:blur(6px);
  align-items:center;
}

.modal-inner{
  position:relative;
  width:100%;
  height:100dvh;
  background:#fff;
  overflow:hidden;
  transform:translateY(100%);
  transition:transform .5s cubic-bezier(0.2,0.9,0.4,1);
  display:flex;flex-direction:column;
}

@media(min-width:500px){
  .modal-inner{
    width:420px;
    height:92dvh;
    border-radius:24px;
    transform:scale(0.88) translateY(30px);
    opacity:0;
    transition:transform .45s cubic-bezier(0.2,0.9,0.4,1), opacity .45s ease;
    box-shadow:0 -20px 80px rgba(0,0,0,0.6);
  }
  #modal.open .modal-inner{
    transform:scale(1) translateY(0);
    opacity:1;
  }
}
#modal.open .modal-inner{transform:translateY(0)}

/* TOP BAR */
.modal-bar{
  position:absolute;top:0;left:0;right:0;
  height:56px;
  background:linear-gradient(to bottom,rgba(0,0,0,0.65),transparent);
  z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;
  pointer-events:none;
}
.modal-work-label{
  font-family:'Cinzel',serif;
  font-size:.5rem;
  letter-spacing:.35em;
  color:rgba(255,255,255,0.65);
  pointer-events:none;
}
.modal-close{
  width:36px;height:36px;
  border-radius:50%;
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.18);
  color:rgba(255,255,255,0.9);
  font-size:1rem;line-height:1;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  pointer-events:auto;
  transition:background .2s;
  flex-shrink:0;
}
.modal-close:hover{background:rgba(0,0,0,0.8)}

#modalFrame{
  flex:1;width:100%;border:none;display:block;background:#fff;
}

/* LOADING */
.modal-loading{
  position:absolute;inset:0;
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;
  z-index:50;
  transition:opacity .4s ease;
}
.modal-loading.gone{opacity:0;pointer-events:none}
.loader-ring{
  width:42px;height:42px;
  border:2px solid rgba(201,169,110,0.12);
  border-top-color:var(--gold);
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{
  font-family:'Cinzel',serif;font-size:.5rem;
  letter-spacing:.45em;color:var(--muted);
}

/* FOOTER */
footer{
  position:relative;z-index:5;
  text-align:center;
  padding:36px 24px 40px;
  border-top:1px solid rgba(201,169,110,0.1);
}
.footer-name{
  font-family:'Great Vibes',cursive;
  font-size:1.8rem;color:var(--gold3);margin-bottom:8px;
}
.footer-link{
  display:inline-flex;align-items:center;gap:8px;
  color:var(--muted);font-size:.58rem;letter-spacing:.3em;
  font-family:'Cinzel',serif;text-decoration:none;
  border-bottom:1px solid rgba(201,169,110,0.18);
  padding-bottom:3px;transition:color .2s,border-color .2s;
}
.footer-link:hover{color:var(--gold);border-color:var(--gold3)}

@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
.scroll-ind{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  margin-top:32px;cursor:pointer;
  animation:bounce 2s ease-in-out infinite;
}
.scroll-ind span{font-size:.5rem;letter-spacing:.4em;color:var(--muted);font-family:'Cinzel',serif}
.scroll-arrow{
  width:16px;height:16px;
  border-right:1px solid rgba(201,169,110,0.35);
  border-bottom:1px solid rgba(201,169,110,0.35);
  transform:rotate(45deg);
}

/* ===== МУЗЫКАЛЬНЫЙ ПЛЕЕР ===== */
.music-player {
  position: fixed;
  bottom: 20px;
  left: 20px;
  right: 20px;
  background: rgba(22, 26, 21, 0.94);
  backdrop-filter: blur(20px);
  border-radius: 60px;
  padding: 10px 16px 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  z-index: 4000;
  border: 1px solid rgba(201, 169, 110, 0.3);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  transition: all 0.3s ease;
}
.music-info {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
  min-width: 0;
}
.music-icon {
  width: 36px;
  height: 36px;
  background: rgba(201,169,110,0.15);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  flex-shrink: 0;
  animation: pulseIcon 2s infinite;
}
@keyframes pulseIcon {
  0%,100% { opacity: 0.7; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.05); }
}
.music-title {
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  color: var(--gold2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.player-controls {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.player-btn {
  background: rgba(201,169,110,0.15);
  border: none;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--gold);
  font-size: 0.9rem;
  transition: all 0.2s;
}
.player-btn:active {
  transform: scale(0.92);
  background: rgba(201,169,110,0.35);
}
.player-volume {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.volume-slider {
  width: 70px;
  height: 3px;
  -webkit-appearance: none;
  background: rgba(201,169,110,0.3);
  border-radius: 3px;
  outline: none;
}
.volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--gold);
  cursor: pointer;
}
.mute-btn {
  background: none;
  border: none;
  color: var(--gold3);
  cursor: pointer;
  font-size: 0.85rem;
  width: 28px;
}
@media (max-width: 550px) {
  .music-player { flex-wrap: wrap; border-radius: 20px; bottom: 15px; left: 15px; right: 15px; }
  .player-volume { order: 3; width: 100%; justify-content: flex-end; margin-top: 6px; }
  .volume-slider { width: 100px; }
  .music-title { font-size: 0.6rem; }
}

/* Экран-заглушка для первого касания */
.start-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(145deg, #0a0c0b, #111510);
  z-index: 10000;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 24px;
  cursor: pointer;
  transition: opacity 0.8s ease, visibility 0.8s ease;
  text-align: center;
  padding: 32px;
}
.start-screen .logo {
  font-family: 'Great Vibes', cursive;
  font-size: 3.5rem;
  color: var(--gold);
  margin-bottom: 16px;
}
.start-screen .tap-text {
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  letter-spacing: 0.3em;
  color: var(--gold2);
  text-transform: uppercase;
}
.start-screen .arrow {
  width: 30px;
  height: 30px;
  border-right: 2px solid var(--gold);
  border-bottom: 2px solid var(--gold);
  transform: rotate(45deg);
  margin-top: 20px;
  animation: bounceArrow 1.5s infinite;
}
@keyframes bounceArrow {
  0%,100% { transform: rotate(45deg) translateY(0); }
  50% { transform: rotate(45deg) translateY(8px); }
}
.start-screen.hide {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}
</style>
</head>
<body>

<!-- ЭКРАН-ЗАГЛУШКА: одно касание запускает музыку и показывает портфолио -->
<div class="start-screen" id="startScreen">
  <div class="logo"></div>
  <div class="tap-text">Прикоснитесь к экрану</div>
  <div class="arrow"></div>
  <div style="margin-top: 30px; font-size: 0.6rem; color: var(--muted); letter-spacing: 0.2em;"></div>
</div>

<div class="ambient"></div>

<header>
  <div class="logo-ornament">
    <div class="line"></div>
    <div class="logo-sym">✦ ✦ ✦</div>
    <div class="line r"></div>
  </div>
  <div class="site-title"></div>
  <div class="site-sub">Электронные свадебные приглашения</div>
  <div class="header-rule">✦</div>
  <div class="stat-row">
    <div class="stat"><div class="stat-num">7</div><div class="stat-label">Работ</div></div>
    <div class="stat"><div class="stat-num">∞</div><div class="stat-label">Вдохновения</div></div>
    <div class="stat"><div class="stat-num">2025</div><div class="stat-label">Сезон</div></div>
  </div>
  <div class="scroll-ind" onclick="document.querySelector('.portfolio-grid').scrollIntoView({behavior:'smooth'})">
    <span>Портфолио</span>
    <div class="scroll-arrow"></div>
  </div>
</header>

<div class="section-header">
  <div class="section-eyebrow">Мои работы</div>
  <div class="section-title">Каждое приглашение — отдельная история</div>
</div>

<div class="portfolio-grid" id="grid"></div>

<footer>
  <div class="footer-name">Dma12r</div>
  <a href="https://t.me/Dma12r" target="_blank" class="footer-link">✦ @Dma12r · Telegram</a>
</footer>

<!-- MODAL -->
<div id="modal" onclick="handleModalBg(event)">
  <div class="modal-inner" id="modalInner">
    <div class="modal-bar">
      <span class="modal-work-label" id="modalLabel"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-loading" id="modalLoading">
      <div class="loader-ring"></div>
      <div class="loader-text">Загрузка...</div>
    </div>
    <iframe id="modalFrame" src="" onload="onFrameLoad()" allow="autoplay"></iframe>
  </div>
</div>

<!-- МУЗЫКАЛЬНЫЙ ПЛЕЕР -->
<div class="music-player" id="musicPlayer" style="display: none;">
  <div class="music-info">
    <div class="music-icon">♪</div>
    <div class="music-title">Свадебная мелодия</div>
  </div>
  <div class="player-controls">
    <button class="player-btn" id="playPauseBtn">⏸</button>
  </div>
  <div class="player-volume">
  </div>
</div>

<script>
  // ===================== МУЗЫКА =====================
  const MUSIC_URL = "https://files.catbox.moe/nq445k.mp3";
  let audio = new Audio(MUSIC_URL);
  audio.loop = true;
  audio.volume = 0.4;
  
  let isPlaying = false;
  let audioStarted = false;
  
  const playPauseBtn = document.getElementById('playPauseBtn');
  const muteBtn = document.getElementById('muteBtn');
  const volumeSlider = document.getElementById('volumeSlider');
  const musicPlayerDiv = document.getElementById('musicPlayer');
  const startScreen = document.getElementById('startScreen');
  
  function startMusic() {
    if (audioStarted) return;
    audio.play().then(() => {
      audioStarted = true;
      isPlaying = true;
      playPauseBtn.innerHTML = '⏸';
      musicPlayerDiv.style.display = 'flex';
    }).catch(e => console.log("Ошибка запуска", e));
  }
  
  function pauseMusic() {
    audio.pause();
    isPlaying = false;
    playPauseBtn.innerHTML = '▶';
  }
  
  function toggleMusic() {
    if (isPlaying) {
      pauseMusic();
    } else {
      audio.play().then(() => {
        isPlaying = true;
        playPauseBtn.innerHTML = '⏸';
        audioStarted = true;
      }).catch(e => console.log);
    }
  }
  
  playPauseBtn.addEventListener('click', toggleMusic);
  muteBtn.addEventListener('click', () => {
    if (audio.muted) {
      audio.muted = false;
      muteBtn.innerHTML = '🔊';
      volumeSlider.value = audio.volume * 100;
    } else {
      audio.muted = true;
      muteBtn.innerHTML = '🔇';
    }
  });
  volumeSlider.addEventListener('input', (e) => {
    const vol = parseInt(e.target.value) / 100;
    audio.volume = vol;
    audio.muted = false;
    muteBtn.innerHTML = '🔊';
    if (vol === 0) muteBtn.innerHTML = '🔇';
  });
  
  // ОДНО КАСАНИЕ — ЗАПУСКАЕМ МУЗЫКУ И УБИРАЕМ ЗАСТАВКУ
  startScreen.addEventListener('click', () => {
    startMusic();
    startScreen.classList.add('hide');
  });
  
  // ===================== КОНФИГ ПРОЕКТОВ =====================
  const PROJECTS = [
    { folder: 'work1', displayTitle: 'OQ STYLE | Белый стиль', tags: ['Белый', 'Акварель', 'Минимализм', 'Таймер'], previewNote: 'Элегантное белое приглашение' },
    { folder: 'work2', displayTitle: 'NAVKAR | Для друзей жениха', tags: ['Navkar', 'Классика', 'Шик', 'Карта'], previewNote: 'Стиль для друзей жениха' },
    { folder: 'work3', displayTitle: 'БАХОР | Вайб весны', tags: ['Весна', 'Цветы', 'Лепестки', 'Анимация'], previewNote: 'Нежное весеннее настроение' },
    { folder: 'work4', displayTitle: 'OSHGA TAKLIFNOMA | Приглашение на плов', tags: ['Плов', 'Семья', 'Уют', 'Традиции'], previewNote: 'Тёплое приглашение на плов' },
    { folder: 'work5', displayTitle: 'MUSLIM STYLE', tags: ['Исламский стиль', 'Дуа', 'Барокко', 'Таймер'], previewNote: 'Духовная элегантность' },
    { folder: 'work6', displayTitle: 'OSHGA TAKLIF 2 | Приглашение на плов 2', tags: ['Плов', 'Гостеприимство', 'Орнамент', 'Карта'], previewNote: 'Щедрое приглашение на плов' },
    { folder: 'work7', displayTitle: 'МИНИМАЛИСТИКА | Таклифнома', tags: ['Минимализм', 'Чистота', 'Типографика', 'Стиль'], previewNote: 'Лаконичное приглашение' }
  ];
  
  const grid = document.getElementById('grid');
  PROJECTS.forEach((proj, idx) => {
    const num = idx + 1;
    const card = document.createElement('div');
    card.className = 'work-card';
    card.innerHTML = `
      <div class="card-preview">
        <div class="work-num">0${num}</div>
        <div class="work-label-big">${proj.previewNote}</div>
        <div class="preview-dots"></div>
      </div>
      <div class="card-body">
        <div class="work-title">${proj.displayTitle}</div>
        <div class="card-tags">${proj.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        <button class="card-btn"><span>✦</span> Посмотреть приглашение <span>✦</span></button>
      </div>
    `;
    card.addEventListener('click', () => openProject(proj.folder, proj.displayTitle));
    grid.appendChild(card);
  });
  
  // ===================== МОДАЛЬНОЕ ОКНО =====================
  function openProject(folderName, displayTitle) {
    const path = `./${folderName}/index.html`;
    document.getElementById('modalLabel').innerText = displayTitle;
    document.getElementById('modalLoading').classList.remove('gone');
    document.getElementById('modalFrame').src = '';
    document.getElementById('modal').classList.add('open');
    document.body.style.overflow = 'hidden';
    document.getElementById('modalFrame').src = path;
  }
  
  function onFrameLoad() {
    setTimeout(() => document.getElementById('modalLoading').classList.add('gone'), 280);
  }
  
  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow = '';
    setTimeout(() => {
      document.getElementById('modalFrame').src = '';
      document.getElementById('modalLoading').classList.remove('gone');
    }, 500);
  }
  
  function handleModalBg(e) { if (e.target === document.getElementById('modal')) closeModal(); }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  
  let touchStartY = 0, touchStartScrollTop = 0;
  const modalInner = document.getElementById('modalInner');
  if (modalInner) {
    modalInner.addEventListener('touchstart', e => {
      touchStartY = e.touches[0].clientY;
      try {
        const iframeDoc = modalInner.querySelector('iframe');
        if (iframeDoc && iframeDoc.contentWindow) touchStartScrollTop = iframeDoc.contentWindow.scrollY || 0;
      } catch(err) { touchStartScrollTop = 0; }
    }, {passive: true});
    modalInner.addEventListener('touchmove', e => {
      if (e.touches[0].clientY - touchStartY > 75 && touchStartScrollTop === 0) closeModal();
    }, {passive: true});
  }
</script>
</body>
</html>

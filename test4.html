<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Азимбек & Севинч · 13.06.2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  background: transparent;
}

body {
  font-family: 'Cormorant Garamond', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  min-height: 100dvh;
}

/* Контейнер — занимает весь экран, без отступов */
.scene {
  position: relative;
  width: 100%;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
}

/* Фото на весь экран — без градиента, без рамок */
.scene img.bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center center;
}

/* Контент поверх фото — только лёгкая тень для читаемости текста, без фона и градиента */
.content {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 20px;
  width: 100%;
  max-width: 480px;
  /* Убрал фон, градиент, рамку — только тени для текста */
}

/* ── КНОПКА "ДАЛЕЕ" СВЕРХУ ── */
.top-nav {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 100;
  font-family: 'Cinzel', serif;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #FFD700;
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255, 215, 0, 0.5);
  border-radius: 40px;
  padding: 8px 20px;
  cursor: pointer;
  transition: all 0.3s ease;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  text-shadow: 0 1px 2px rgba(0,0,0,0.3);
}

.top-nav:hover {
  background: rgba(0, 0, 0, 0.7);
  border-color: #FFD700;
  letter-spacing: 5px;
  transform: translateY(-1px);
}

.top-nav:active {
  transform: translateY(1px);
}

.top-nav span:first-child {
  font-size: 11px;
}

/* ── WEDDING DAY ── */
.label-wedding {
  font-family: 'Cinzel', serif;
  font-size: clamp(10px, 3vw, 13px);
  font-weight: 500;
  letter-spacing: 8px;
  color: #FFD700;
  text-transform: uppercase;
  opacity: 0;
  transform: translateY(10px);
  animation: fadeUp 1.2s cubic-bezier(0.22,1,0.36,1) 0.6s forwards;
  margin-bottom: 18px;
  text-shadow: 0 2px 5px rgba(0,0,0,0.6);
}

/* ── линия-разделитель ── */
.line-divider {
  display: flex;
  align-items: center;
  gap: 8px;
  opacity: 0;
  animation: fadeUp 1s ease 1.2s forwards;
  margin-bottom: 22px;
}
.line-divider .hl { width: 45px; height: 1px; background: rgba(255,215,0,0.8); }
.line-divider .dia {
  width: 6px; height: 6px;
  background: #FFD700;
  transform: rotate(45deg);
  box-shadow: 0 0 6px rgba(255,215,0,0.7);
}

/* ── ИМЕНА ── */
.name-azimbek {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 600;
  font-size: clamp(44px, 13vw, 68px);
  color: #FFFFFF;
  line-height: 1.05;
  letter-spacing: 2px;
  opacity: 0;
  transform: translateY(16px);
  animation: fadeUp 1.4s cubic-bezier(0.22,1,0.36,1) 1.6s forwards;
  text-shadow: 0 0 12px rgba(255,215,0,0.7), 0 2px 8px rgba(0,0,0,0.5);
}

.amp-wrap {
  display: flex;
  align-items: center;
  gap: 16px;
  opacity: 0;
  animation: fadeIn 1s ease 2.4s forwards;
  margin: 8px 0;
}
.amp-line { width: 35px; height: 1px; background: rgba(255,215,0,0.7); }
.amp-char {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 400;
  font-size: clamp(26px, 7vw, 36px);
  color: #FFD700;
  letter-spacing: 2px;
  text-shadow: 0 0 10px rgba(255,215,0,0.6);
}

.name-sevinch {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 600;
  font-size: clamp(44px, 13vw, 68px);
  color: #FFFFFF;
  line-height: 1.05;
  letter-spacing: 2px;
  opacity: 0;
  transform: translateY(16px);
  animation: fadeUp 1.4s cubic-bezier(0.22,1,0.36,1) 2.8s forwards;
  text-shadow: 0 0 12px rgba(255,215,0,0.7), 0 2px 8px rgba(0,0,0,0.5);
}

/* ── нижний разделитель ── */
.line-divider2 {
  display: flex;
  align-items: center;
  gap: 8px;
  opacity: 0;
  animation: fadeIn 1s ease 3.4s forwards;
  margin: 25px 0 20px;
}
.line-divider2 .hl { width: 35px; height: 1px; background: rgba(255,215,0,0.7); }
.line-divider2 .dia { width: 5px; height: 5px; background: #FFD700; transform: rotate(45deg); }
.line-divider2 .sm  { width: 3px; height: 3px; background: rgba(255,215,0,0.8); transform: rotate(45deg); }

/* ── ДАТА ── */
.date {
  font-family: 'Cinzel', serif;
  font-size: clamp(12px, 3.5vw, 15px);
  font-weight: 500;
  letter-spacing: 6px;
  color: #FFD700;
  opacity: 0;
  animation: fadeUp 1s ease 3.6s forwards;
  margin-bottom: 30px;
  text-shadow: 0 1px 4px rgba(0,0,0,0.6);
}

/* ── КНОПКА ОТКРЫТЬ ── */
.btn-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  opacity: 0;
  animation: fadeUp 1s cubic-bezier(0.22,1,0.36,1) 4.2s forwards;
}

.v-thread {
  width: 1px;
  height: 30px;
  background: linear-gradient(to bottom, transparent, rgba(255,215,0,0.8));
}
.v-jewel {
  width: 6px; height: 6px;
  background: #FFD700;
  transform: rotate(45deg);
  margin: 5px 0 8px;
  box-shadow: 0 0 8px rgba(255,215,0,0.7);
}

.open-btn {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: #FFD700;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1.5px solid rgba(255,215,0,0.7);
  border-radius: 60px;
  padding: 0;
  cursor: pointer;
  outline: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: all 0.4s ease;
  -webkit-tap-highlight-color: transparent;
}

.btn-inner {
  position: relative;
  padding: 14px 44px;
  transition: all 0.4s ease;
  letter-spacing: 6px;
  font-weight: 600;
  border-radius: 60px;
}

.open-btn:hover {
  background: rgba(0,0,0,0.7);
  border-color: #FFD700;
  letter-spacing: 8px;
  transform: scale(1.02);
}

.open-btn:active {
  transform: scale(0.97);
}

.orn-row {
  display: flex; align-items: center; gap: 6px;
  margin-top: 14px;
}
.orn-hl { width: 25px; height: 1px; background: rgba(255,215,0,0.6); }
.orn-d  { width: 4px; height: 4px; background: #FFD700; transform: rotate(45deg); }
.orn-c  { width: 3px; height: 3px; border-radius: 50%; background: rgba(255,215,0,0.7); }

/* keyframes */
@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  to { opacity: 1; }
}

/* ── LIGHTBOX ── */
.lightbox {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  transition: opacity 0.5s ease;
  padding: 20px;
}
.lightbox.on { opacity: 1; }
.lb-inner {
  width: min(92vw, 460px);
  border-radius: 24px;
  overflow: hidden;
  transform: scale(0.94) translateY(10px);
  transition: transform 0.5s cubic-bezier(0.22,1,0.36,1);
  border: 1px solid rgba(255,215,0,0.2);
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
}
.lightbox.on .lb-inner { transform: scale(1) translateY(0); }
.lb-inner img { display: block; width: 100%; height: auto; }
.lb-close {
  position: absolute;
  top: max(22px, env(safe-area-inset-top,22px)); right: 22px;
  font-family: 'Cinzel', serif;
  font-size: 9px; letter-spacing: 4px; text-transform: uppercase;
  color: #FFD700;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,215,0,0.5);
  border-radius: 40px;
  padding: 10px 22px;
  cursor: pointer;
  transition: all 0.3s;
}
.lb-close:active { color: #fff; border-color: #FFD700; background: rgba(0,0,0,0.7); }

.ripple {
  position: absolute; border-radius: 50%;
  background: rgba(255,215,0,0.35);
  transform: scale(0);
  animation: rpl 0.55s linear forwards;
  pointer-events: none;
}
@keyframes rpl { to { transform: scale(6); opacity: 0); } }

/* Адаптация под телефоны — убраны все фоны */
@media (max-width: 550px) {
  .content {
    padding: 16px;
    width: 100%;
  }
  .btn-inner {
    padding: 12px 32px;
    font-size: 9px;
    letter-spacing: 5px;
  }
  .label-wedding {
    letter-spacing: 6px;
    font-size: 9px;
  }
  .date {
    letter-spacing: 4px;
    font-size: 11px;
  }
  .top-nav {
    top: 14px;
    right: 14px;
    padding: 6px 16px;
    font-size: 7px;
    letter-spacing: 3px;
  }
  .top-nav span:first-child {
    font-size: 9px;
  }
}

@media (min-width: 800px) {
  .scene {
    max-width: 100%;
  }
}
</style>
</head>
<body>

<!-- КНОПКА "ДАЛЕЕ" СВЕРХУ — ведёт на test5.html -->
<a href="test5.html" class="top-nav" id="nextBtn">
  <span>→</span>
  <span>Далее</span>
</a>

<div class="scene">
  <img class="bg" src="https://i.postimg.cc/m2ryghvS/photo-2026-05-23-12-09-35.jpg" alt="Свадебный фон" />

  <div class="content">
    <div class="label-wedding">Wedding Day</div>

    <div class="line-divider">
      <div class="hl"></div>
      <div class="dia"></div>
      <div class="hl"></div>
    </div>

    <div class="name-azimbek">Азимбек</div>

    <div class="amp-wrap">
      <div class="amp-line"></div>
      <div class="amp-char">&amp;</div>
      <div class="amp-line"></div>
    </div>

    <div class="name-sevinch">Севинч</div>

    <div class="line-divider2">
      <div class="hl"></div>
      <div class="sm"></div>
      <div class="dia"></div>
      <div class="sm"></div>
      <div class="hl"></div>
    </div>

    <div class="date">13 · 06 · 2026</div>

    <div class="btn-group">
      <div class="v-thread"></div>
      <div class="v-jewel"></div>
      <button class="open-btn" id="openBtn">
        <div class="btn-inner">Открыть приглашение</div>
      </button>
      <div class="orn-row">
        <div class="orn-hl"></div>
        <div class="orn-c"></div>
        <div class="orn-d"></div>
        <div class="orn-c"></div>
        <div class="orn-hl"></div>
      </div>
    </div>
  </div>
</div>

<script>
const btn = document.getElementById('openBtn');

function ripple(e) {
  const rect = btn.getBoundingClientRect();
  const r = document.createElement('span');
  r.className = 'ripple';
  const s = Math.max(rect.width, rect.height) * 1.5;
  let clientX, clientY;
  if (e.touches) {
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }
  const cx = clientX - rect.left - s/2;
  const cy = clientY - rect.top - s/2;
  r.style.cssText = `width:${s}px;height:${s}px;left:${cx}px;top:${cy}px`;
  btn.style.position = 'relative';
  btn.style.overflow = 'hidden';
  btn.appendChild(r);
  setTimeout(() => { r.remove(); btn.style.overflow = ''; }, 600);
}

function openLb() {
  const lb = document.createElement('div');
  lb.className = 'lightbox';
  const inner = document.createElement('div');
  inner.className = 'lb-inner';
  const img = document.createElement('img');
  img.src = 'https://i.postimg.cc/SRn0rgzP/f6c4834d-4c4a-4fdf-902b-a90b6567cd63.png';
  img.alt = 'Азимбек & Севинч';
  inner.appendChild(img);
  const close = document.createElement('button');
  close.className = 'lb-close';
  close.textContent = 'Закрыть';
  lb.appendChild(inner);
  lb.appendChild(close);
  document.body.appendChild(lb);
  requestAnimationFrame(() => requestAnimationFrame(() => lb.classList.add('on')));
  const off = () => { lb.classList.remove('on'); setTimeout(() => lb.remove(), 500); };
  close.addEventListener('click', off);
  lb.addEventListener('click', e => { if (e.target === lb) off(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') off(); }, { once: true });
}

btn.addEventListener('click', e => { ripple(e); setTimeout(openLb, 130); });
btn.addEventListener('touchstart', e => { ripple(e); }, { passive: false });
</script>
</body>
</html>
